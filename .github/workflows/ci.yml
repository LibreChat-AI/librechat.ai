name: CI

# Lint, unit tests, and a full type-check on every PR and push to main. The
# type-check generates Fumadocs' .source types first (so @/.source resolves),
# which is what catches issues a bare `next build` grep can miss.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Type-check
        run: |
          npx fumadocs-mdx
          pnpm exec tsc --noEmit
