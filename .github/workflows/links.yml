name: Links

# Monitors documentation for broken links. Runs weekly, on pushes to main that
# touch docs, and on demand. External link flakiness (403/429 from bots, rate
# limits) makes per-PR gating noisy, so instead of failing a run this opens or
# updates a tracking issue with the report.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1' # Mondays 08:00 UTC
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'README.md'
      - '.github/workflows/links.yml'
      - '.lycheeignore'

permissions:
  contents: read
  issues: write

# Serialize runs so overlapping triggers (frequent main pushes + schedule)
# can't each open a separate issue before the other's exists.
concurrency:
  group: link-checker
  cancel-in-progress: false

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --include-fragments
            --base-url https://www.librechat.ai
            --accept 200,403,429
            './content/**/*.mdx'
            './content/**/*.md'
            './README.md'
          fail: false

      - name: Find existing broken links issue
        id: existing-issue
        if: steps.lychee.outputs.exit_code != 0
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Broken links found in documentation'
            // No space after the comma: the GitHub API treats the label list
            // literally, so 'documentation, automated' would look for a label
            // named ' automated' (leading space) and match nothing.
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'documentation,automated',
              per_page: 100,
            })
            const existing = issues.find((issue) => !issue.pull_request && issue.title === title)
            if (existing) {
              core.setOutput('issue-number', String(existing.number))
            }

      - name: Open or update issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          issue-number: ${{ steps.existing-issue.outputs.issue-number }}
          title: Broken links found in documentation
          content-filepath: ./lychee/out.md
          labels: documentation, automated
