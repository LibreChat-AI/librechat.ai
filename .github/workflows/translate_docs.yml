name: Translate Docs

on:
  push:
    branches: [main]
    paths:
      - 'content/docs/**'
      - '!content/docs/**/*.zh.mdx'
      - '!content/docs/**/*.es.mdx'
      - '!content/docs/**/*.fr.mdx'
      - '!content/docs/**/*.de.mdx'
      - '!content/docs/**/*.ja.mdx'
      - '!content/docs/**/meta.zh.json'
      - '!content/docs/**/meta.es.json'
      - '!content/docs/**/meta.fr.json'
      - '!content/docs/**/meta.de.json'
      - '!content/docs/**/meta.ja.json'
  workflow_dispatch:
    inputs:
      force:
        description: 'Retranslate everything (ignore the cache)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: translate-docs
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Translate docs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_TRANSLATE_MODEL: ${{ vars.OPENROUTER_TRANSLATE_MODEL }}
        run: |
          FLAGS=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FLAGS="--force"
          fi
          npx tsx scripts/translate.ts $FLAGS

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'content/docs/**' 'content/.i18n-cache/**'
          if git diff --cached --quiet; then
            echo "No translation changes to commit"
          else
            git commit --no-verify -m "chore: update docs translations"
            git push
          fi
