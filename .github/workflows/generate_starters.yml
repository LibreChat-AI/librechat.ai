name: Generate AI Starters

on:
  push:
    branches: [main]
    paths: ['content/docs/**']
  workflow_dispatch:
    inputs:
      force:
        description: 'Regenerate all starters (ignore hashes)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate starters
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          FLAGS=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FLAGS="--force"
          fi
          npx tsx scripts/generate-starters.ts $FLAGS

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/starters.json public/starters-hashes.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update AI conversation starters [skip ci]"
            git push
          fi
